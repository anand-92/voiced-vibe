<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoiceCode</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- Screen 1: Project Picker -->
      <div id="project-picker" class="screen">
        <div class="picker-content">
          <h1 class="picker-title">VoiceCode</h1>
          <p class="picker-subtitle">Select a project folder to get started</p>

          <div class="path-input-row">
            <input
              type="text"
              id="project-path"
              placeholder="/path/to/your/project"
              spellcheck="false"
            />
            <button id="browse-btn">Browse</button>
            <button id="open-btn">Open</button>
          </div>

          <div id="folder-browser">
            <div id="browser-header"></div>
            <div id="browser-list"></div>
          </div>

          <div id="recent-projects"></div>
        </div>
      </div>

      <!-- Screen 2: Voice UI -->
      <div id="voice-screen" class="screen" style="display: none">
        <header id="header">
          <div id="header-left">
            <h1>VoiceCodePlus</h1>
            <span id="project-name" class="project-name"></span>
            <button id="change-project-btn" title="Change project">Change</button>
          </div>
          <div id="controls">
            <button id="new-chat-btn" title="Clear Gemini context and start fresh">New Chat</button>
            <select id="language-select" title="Speech language">
              <option value="en-US">English</option>
              <option value="hi-IN">Hindi</option>
              <option value="es-ES">Spanish</option>
              <option value="fr-FR">French</option>
              <option value="de-DE">German</option>
              <option value="ja-JP">Japanese</option>
              <option value="ko-KR">Korean</option>
              <option value="pt-BR">Portuguese</option>
              <option value="zh-CN">Chinese</option>
              <option value="ar-SA">Arabic</option>
            </select>
            <select id="mode-select">
              <option value="toggle">Toggle</option>
              <option value="always-on">Always-On</option>
              <option value="push-to-talk">Push-to-Talk</option>
            </select>
            <button id="connect-btn">Connect</button>
          </div>
        </header>

        <main id="main">
          <!-- Left panel: Voice -->
          <section id="voice-panel">
            <div id="status-bar">
              <span id="connection-status" class="status-dot disconnected"></span>
              <span id="status-text">Disconnected</span>
            </div>

            <div id="mic-area">
              <div id="mic-wrapper">
                <div id="wave-container">
                  <canvas id="wave-canvas"></canvas>
                </div>
                <button id="mic-btn" class="mic-btn" aria-label="Hold to speak">
                  <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
                    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                  </svg>
                </button>
              </div>
              <p id="mic-hint">Tap Space to Talk</p>
            </div>

            <div id="text-input-area">
            <div id="attachment-preview"></div>
            <div id="input-row">
              <button id="attach-btn" title="Attach screenshot">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                  <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
                </svg>
              </button>
              <input type="text" id="text-input" placeholder="Type a message or paste a screenshot" spellcheck="false" />
              <input type="file" id="file-input" accept="image/*" multiple style="display:none" />
            </div>
          </div>

          <div id="transcript"></div>
          </section>

          <!-- Right panel: Unified timeline -->
          <section id="activity-panel">
            <div id="filter-bar">
              <label class="filter-chip" data-filter="gemini-thinking"><input type="checkbox" checked /><span class="chip-dot" style="background:#58a6ff"></span>Gemini Thinking</label>
              <label class="filter-chip" data-filter="gemini-tool-call"><input type="checkbox" checked /><span class="chip-dot" style="background:#d29922"></span>Tool Call</label>
              <label class="filter-chip" data-filter="gemini-tool-result"><input type="checkbox" checked /><span class="chip-dot" style="background:#3fb950"></span>Tool Result</label>
              <label class="filter-chip" data-filter="claude-tool"><input type="checkbox" checked /><span class="chip-dot" style="background:#79c0ff"></span>Agent Activity</label>
              <label class="filter-chip" data-filter="claude-thinking"><input type="checkbox" checked /><span class="chip-dot" style="background:#bc8cff"></span>Agent Thinking</label>
              <label class="filter-chip" data-filter="file-change"><input type="checkbox" checked /><span class="chip-dot" style="background:#f0883e"></span>File Changes</label>
              <label class="filter-chip" data-filter="status"><input type="checkbox" checked /><span class="chip-dot" style="background:#6e7681"></span>Status</label>
            </div>
            <div id="timeline"></div>
          </section>
        </main>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
